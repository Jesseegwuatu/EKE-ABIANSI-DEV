<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eke Abiansi - Announcements</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#b22222',
                        secondary: '#f5f5f5',
                        accent: '#333333',
                    },
                    animation: {
                        'fade-in': 'fadeIn 1s ease-in',
                        'slide-up': 'slideUp 0.8s ease-out',
                        'slide-down': 'slideDown 0.8s ease-out',
                        'bounce-slow': 'bounce 3s infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'modal-pop': 'modalPop 0.3s ease-out',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { transform: 'translateY(50px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                        slideDown: { '0%': { transform: 'translateY(-50px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-20px)' } },
                        modalPop: { '0%': { transform: 'scale(0.8)', opacity: '0' }, '100%': { transform: 'scale(1)', opacity: '1' } },
                    },
                }
            }
        }
    </script>
    
    <!-- Box Icons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- PhotoSwipe for image zoom -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.min.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            color: #333333;
            overflow-x: hidden;
        }
        
        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
        }
        
        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        .bg-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(178, 34, 34, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(51, 51, 51, 0.03) 0%, transparent 50%);
            animation: gradientBG 15s ease infinite;
        }
        
        @keyframes gradientBG {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }
        
        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(178, 34, 34, 0.2);
            border-radius: 50%;
            animation: float-particle 20s infinite linear;
        }
        
        @keyframes float-particle {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }
        
        /* Cards */
        .glass-card {
            background: white;
            border: 1px solid rgba(178, 34, 34, 0.1);
            border-radius: 1rem;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        
        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 50px -20px rgba(178, 34, 34, 0.2);
        }
        
        /* Navbar */
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(178, 34, 34, 0.1);
            z-index: 1000;
        }
        
        .navbar.scrolled {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        /* Logo styling */
        .logo-img {
            height: 50px;
            width: auto;
            max-width: 200px;
            object-fit: contain;
        }
        
        /* Mobile Menu */
        .mobile-menu {
            position: fixed;
            top: 0;
            left: -100%;
            width: 80%;
            max-width: 400px;
            height: 100vh;
            background: white;
            z-index: 1001;
            transition: left 0.3s ease;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            overflow-y: auto;
        }
        
        .mobile-menu.open { left: 0; }
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: none;
            backdrop-filter: blur(3px);
        }
        .menu-overlay.active { display: block; }
        
        /* Buttons */
        .btn-primary {
            background: #b22222;
            color: white;
            font-weight: 600;
            padding: 0.9rem 2rem;
            border-radius: 1rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            display: inline-block;
        }
        
        .btn-primary:hover {
            background: #8b1a1a;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(178, 34, 34, 0.3);
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid #b22222;
            color: #b22222;
            font-weight: 600;
            padding: 0.8rem 1.5rem;
            border-radius: 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .btn-outline:hover {
            background: #b22222;
            color: white;
        }
        
        /* Announcement Card */
        .announcement-card {
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.1);
            transition: all 0.5s ease;
            border: 1px solid rgba(178, 34, 34, 0.1);
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .announcement-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px -15px rgba(178, 34, 34, 0.2);
        }
        
        .announcement-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.5s ease;
        }
        
        .announcement-card:hover .announcement-image {
            transform: scale(1.05);
        }
        
        .announcement-content {
            padding: 2rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .announcement-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #b22222;
            margin-bottom: 0.75rem;
        }
        
        .announcement-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: #666;
        }
        
        .announcement-from {
            background: rgba(178, 34, 34, 0.1);
            color: #b22222;
            padding: 0.25rem 1rem;
            border-radius: 2rem;
            font-weight: 500;
        }
        
        .announcement-date {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .announcement-text {
            color: #333;
            line-height: 1.8;
            font-size: 1rem;
            margin-top: 1rem;
            white-space: pre-line;
        }
        
        /* Single Announcement View */
        .single-announcement {
            max-width: 800px;
            margin: 2rem auto;
        }
        
        .single-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 1rem;
            margin-bottom: 2rem;
            cursor: pointer;
        }
        
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            color: #b22222;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .back-button:hover {
            transform: translateX(-5px);
        }
        
        /* Loader */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            transition: opacity 0.5s ease;
        }
        
        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #f5f5f5;
            border-top: 4px solid #b22222;
            border-right: 4px solid #b22222;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Section Styles */
        .section-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: #b22222;
            text-align: center;
            margin-bottom: 1rem;
        }
        
        .section-subtitle {
            font-size: 1.1rem;
            color: #666;
            text-align: center;
            max-width: 700px;
            margin: 0 auto 3rem;
        }
        
        .gold-border {
            width: 80px;
            height: 4px;
            background: #b22222;
            margin: 1rem auto;
            border-radius: 2px;
        }
        
        @media (max-width: 768px) {
            .section-title { font-size: 2rem; }
            .logo-img { height: 40px; }
            .announcement-image { height: 200px; }
            .announcement-title { font-size: 1.25rem; }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg">
        <div class="bg-gradient"></div>
        <div class="particles" id="particles"></div>
    </div>
    
    <!-- Loader -->
    <div id="loader">

    <!-- Mobile Menu Overlay -->
    <div class="menu-overlay" id="menuOverlay"></div>
    
    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu">

    <!-- NAVBAR -->
    <nav class="navbar fixed w-full z-50 px-6 py-4" id="navbar">
        <div class="max-w-7xl mx-auto flex justify-between items-center">

                <a href="index.html">

    <!-- MAIN CONTENT -->
    <div class="pt-32 pb-24 px-6" id="mainContent">

    <footer class="bg-primary text-white py-12 px-6">
        <div class="max-w-7xl mx-auto text-center">

    <!-- Firebase Module -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
        
        // ============================================
        // FIREBASE CONFIG
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyBWwZ2fZeu0bbkTXnw4h42d6WDV8NffBEY",
            authDomain: "eke-abiansi-dev.firebaseapp.com",
            databaseURL: "https://eke-abiansi-dev-default-rtdb.firebaseio.com",
            projectId: "eke-abiansi-dev",
            storageBucket: "eke-abiansi-dev.firebasestorage.app",
            messagingSenderId: "1014611002869",
            appId: "1:1014611002869:web:c33bcf7e03d4a4e2168cbc"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // DOM Elements
        const loader = document.getElementById('loader');
        const contentArea = document.getElementById('contentArea');
        
        // Hide loader
        window.addEventListener('load', () => {
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500);
            }, 1500);
        });
        
        // ============================================
        // OPEN IMAGE IN LIGHTBOX
        // ============================================
        window.openImage = function(imageUrl) {
            // Create modal for image
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/95 z-[100000] flex items-center justify-center p-4';
            modal.onclick = () => modal.remove();
            
            const img = document.createElement('img');
            img.src = imageUrl;
            img.className = 'max-w-full max-h-[90vh] object-contain rounded-lg';
            
            modal.appendChild(img);
            document.body.appendChild(modal);
        };
        
        // ============================================
        // LOAD ANNOUNCEMENTS
        // ============================================
        function loadAnnouncements() {
            // Check if there's a specific announcement ID in URL
            const urlParams = new URLSearchParams(window.location.search);
            const announcementId = urlParams.get('id');
            
            if (announcementId) {
                loadSingleAnnouncement(announcementId);
            } else {
                loadAllAnnouncements();
            }
        }
        
        function loadAllAnnouncements() {
            contentArea.innerHTML = `
                <h1 class="section-title" data-aos="fade-up">Community Announcements</h1>
                <div class="gold-border"></div>
                <p class="section-subtitle" data-aos="fade-up" data-aos-delay="100">
                    Stay updated with the latest news and updates from our community
                </p>
                <div id="announcementsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mt-16">
                    <div class="col-span-full text-center py-12">
                        <div class="loader-spinner mx-auto"></div>
                        <p class="mt-4 text-gray-500">Loading announcements...</p>
                    </div>
                </div>
            `;
            
            const announcementsRef = ref(db, 'announcements');
            onValue(announcementsRef, (snapshot) => {
                const grid = document.getElementById('announcementsGrid');
                
                if (snapshot.exists()) {
                    const announcements = [];
                    snapshot.forEach(child => {
                        announcements.push({ id: child.key, ...child.val() });
                    });
                    
                    // Sort by newest first
                    announcements.sort((a, b) => b.timestamp - a.timestamp);
                    
                    if (announcements.length > 0) {
                        grid.innerHTML = announcements.map(ann => `
                            <div class="announcement-card" data-aos="fade-up">
                                ${ann.image ? `
                                    <img src="${ann.image}" class="announcement-image" onclick="openImage('${ann.image}')" alt="${ann.title}">
                                ` : ''}
                                <div class="announcement-content">
                                    <h3 class="announcement-title">${ann.title}</h3>
                                    <div class="announcement-meta">
                                        ${ann.from ? `<span class="announcement-from"><i class='bx bx-user mr-1'></i>${ann.from}</span>` : ''}
                                        <span class="announcement-date">
                                            <i class='bx bx-calendar'></i>
                                            ${new Date(ann.timestamp).toLocaleDateString()}
                                        </span>
                                    </div>
                                    <p class="text-gray-600 mb-4 line-clamp-3">${ann.content}</p>
                                    <a href="announcements.html?id=${ann.id}" class="text-primary hover:underline font-semibold mt-auto inline-block">
                                        Read Full Announcement →
                                    </a>
                                </div>
                            </div>
                        `).join('');
                    } else {
                        grid.innerHTML = '<div class="col-span-full text-center py-12 text-gray-500">No announcements yet.</div>';
                    }
                } else {
                    grid.innerHTML = '<div class="col-span-full text-center py-12 text-gray-500">No announcements yet.</div>';
                }
            });
        }
        
        function loadSingleAnnouncement(id) {
            contentArea.innerHTML = `
                <div class="single-announcement">
                    <div class="back-button" onclick="window.location.href='announcements.html'">
                        <i class='bx bx-arrow-back'></i>
                        Back to All Announcements
                    </div>
                    <div id="singleAnnouncement" class="glass-card p-8">
                        <div class="text-center py-12">
                            <div class="loader-spinner mx-auto"></div>
                            <p class="mt-4 text-gray-500">Loading announcement...</p>
                        </div>
                    </div>
                </div>
            `;
            
            const announcementsRef = ref(db, 'announcements');
            onValue(announcementsRef, (snapshot) => {
                const container = document.getElementById('singleAnnouncement');
                
                if (snapshot.exists()) {
                    let announcement = null;
                    snapshot.forEach(child => {
                        if (child.key === id) {
                            announcement = { id: child.key, ...child.val() };
                        }
                    });
                    
                    if (announcement) {
                        container.innerHTML = `
                            ${announcement.image ? `
                                <img src="${announcement.image}" class="single-image" onclick="openImage('${announcement.image}')" alt="${announcement.title}">
                            ` : ''}
                            <h1 class="text-3xl md:text-4xl font-bold text-primary mb-4">${announcement.title}</h1>
                            
                            <div class="flex flex-wrap gap-4 items-center mb-6 text-gray-500">
                                ${announcement.from ? `
                                    <span class="bg-primary/10 text-primary px-3 py-1 rounded-full">
                                        <i class='bx bx-user mr-1'></i>${announcement.from}
                                    </span>
                                ` : ''}
                                <span class="flex items-center gap-1">
                                    <i class='bx bx-calendar'></i>
                                    ${new Date(announcement.timestamp).toLocaleDateString()}
                                </span>
                                <span class="flex items-center gap-1">
                                    <i class='bx bx-time'></i>
                                    ${new Date(announcement.timestamp).toLocaleTimeString()}
                                </span>
                            </div>
                            
                            <div class="prose prose-lg max-w-none text-gray-700 leading-relaxed">
                                ${announcement.content.split('\n').map(p => p.trim() ? `<p class="mb-4">${p}</p>` : '').join('')}
                            </div>
                            
                            <div class="mt-8 pt-8 border-t border-gray-200">
                                <a href="announcements.html" class="text-primary hover:underline font-semibold">
                                    ← Back to All Announcements
                                </a>
                            </div>
                        `;
                    } else {
                        container.innerHTML = `
                            <div class="text-center py-12">
                                <i class='bx bx-error-circle text-6xl text-red-500 mb-4'></i>
                                <h2 class="text-2xl font-bold text-gray-800 mb-2">Announcement Not Found</h2>
                                <p class="text-gray-600 mb-6">The announcement you're looking for doesn't exist.</p>
                                <a href="announcements.html" class="btn-primary">View All Announcements</a>
                            </div>
                        `;
                    }
                } else {
                    container.innerHTML = `
                        <div class="text-center py-12">
                            <i class='bx bx-error-circle text-6xl text-red-500 mb-4'></i>
                            <h2 class="text-2xl font-bold text-gray-800 mb-2">No Announcements Found</h2>
                            <p class="text-gray-600 mb-6">There are no announcements yet.</p>
                            <a href="index.html" class="btn-primary">Go to Homepage</a>
                        </div>
                    `;
                }
            });
        }
        
        // Load announcements on page load
        loadAnnouncements();
        
    </script>
    
    <!-- AOS Script -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
        
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            navbar.classList.toggle('scrolled', window.scrollY > 50);
        });
        
        function toggleMenu() {
            document.getElementById('mobileMenu').classList.add('open');
            document.getElementById('menuOverlay').classList.add('active');
        }
        
        function closeMenu() {
            document.getElementById('mobileMenu').classList.remove('open');
            document.getElementById('menuOverlay').classList.remove('active');
        }
        
        document.getElementById('menuOverlay').addEventListener('click', closeMenu);
        
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                    closeMenu();
                }
            });
        });
    </script>
</body>
</html>
